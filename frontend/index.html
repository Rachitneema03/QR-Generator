<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --surface: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --line: #d1d5db;
            --line-strong: #9ca3af;
            --primary: #0f172a;
            --primary-hover: #111827;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", Tahoma, Verdana, sans-serif;
            line-height: 1.45;
        }

        .panel {
            width: 100%;
            max-width: 560px;
            background: var(--surface);
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .repo-actions {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 10px;
            z-index: 20;
        }

        .repo-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border-radius: 8px;
            border: 1px solid #111827;
            background: #ffffff;
            color: #111827;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            line-height: 1;
            transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
        }

        .repo-btn:hover {
            background: #111827;
            color: #ffffff;
            border-color: #111827;
        }

        .repo-btn svg {
            width: 15px;
            height: 15px;
            flex: 0 0 15px;
            fill: currentColor;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .subtitle {
            margin: 8px 0 24px;
            color: var(--muted);
            font-size: 14px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            letter-spacing: 0.2px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            flex: 1;
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text);
            background: #fff;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        input:focus {
            border-color: var(--line-strong);
            box-shadow: 0 0 0 3px rgba(156, 163, 175, 0.22);
        }

        button {
            border: 0;
            border-radius: 8px;
            padding: 11px 16px;
            background: var(--primary);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.05s ease;
            white-space: nowrap;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        #status {
            margin: 14px 0 0;
            min-height: 20px;
            font-size: 14px;
            color: #4b5563;
        }

        .result {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
        }

        img {
            display: none;
            width: 220px;
            height: 220px;
            object-fit: contain;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fff;
            padding: 10px;
        }

        @media (max-width: 560px) {
            .repo-actions {
                top: 10px;
                right: 10px;
                left: 10px;
                justify-content: flex-end;
                gap: 8px;
            }

            .repo-btn {
                padding: 8px 10px;
                font-size: 12px;
            }

            .panel {
                padding: 20px;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            button {
                width: 100%;
            }

            img {
                width: 100%;
                max-width: 260px;
                height: auto;
            }
        }

        .footer {
            margin-top: 18px;
            padding-top: 12px;
            border-top: 1px solid #e5e7eb;
            font-size: 12px;
            color: #6b7280;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="repo-actions" aria-label="GitHub project actions">
        <a
            class="repo-btn"
            href="https://github.com/Rachitneema03/QR-Generator/pulls"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Contribute to this project on GitHub"
        >
            <svg viewBox="0 0 16 16" aria-hidden="true">
                <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.66 7.66 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
            </svg>
            <span>Contribute</span>
        </a>

        <a
            class="repo-btn"
            href="https://github.com/Rachitneema03/QR-Generator"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Star this project on GitHub"
        >
            <svg viewBox="0 0 16 16" aria-hidden="true">
                <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.66 7.66 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
            </svg>
            <span id="starLabel">Star</span>
        </a>
    </div>

    <main class="panel">
        <h1>QR Code Generator</h1>
        <p class="subtitle">Generate a clean QR code from any valid URL.</p>

        <label for="url">Website URL</label>
        <div class="controls">
            <input id="url" type="text" placeholder="https://example.com">
            <button id="generateBtn" type="button">Generate</button>
        </div>

        <p id="status" aria-live="polite"></p>

        <section class="result" aria-label="QR result">
            <img id="qrImage" alt="Generated QR code">
        </section>

        <footer class="footer">
            &copy; 2026 rachitneema. All rights reserved.
        </footer>
    </main>
</body>

<script>
    const urlEl = document.getElementById("url");
    const statusEl = document.getElementById("status");
    const qrImageEl = document.getElementById("qrImage");
    const generateBtn = document.getElementById("generateBtn");
    const starLabelEl = document.getElementById("starLabel");

    function getApiCandidates() {
        const candidates = [];

        if (window.location.protocol === "file:") {
            candidates.push("http://127.0.0.1:5000/generate-qr");
            return candidates;
        }

        candidates.push("/generate-qr");

        const isFlaskOrigin = window.location.hostname === "127.0.0.1" && window.location.port === "5000";
        if (!isFlaskOrigin) {
            candidates.push("http://127.0.0.1:5000/generate-qr");
        }

        return candidates;
    }

    async function requestQrImage(url) {
        const apiCandidates = getApiCandidates();
        let lastError = new Error("Could not connect to backend.");

        for (const endpoint of apiCandidates) {
            try {
                const response = await fetch(endpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url })
                });

                const contentType = response.headers.get("content-type") || "";
                const data = contentType.includes("application/json")
                    ? await response.json()
                    : {};

                if (!response.ok || !data.image) {
                    throw new Error(data.error || `Backend request failed (${response.status}).`);
                }

                return data.image;
            } catch (error) {
                lastError = error;
            }
        }

        throw lastError;
    }

    async function generateQr() {
        const url = urlEl.value.trim();
        if (!url) {
            statusEl.textContent = "Please enter a URL.";
            return;
        }

        generateBtn.disabled = true;
        statusEl.textContent = "Generating...";

        try {
            const imageData = await requestQrImage(url);
            qrImageEl.src = imageData;
            qrImageEl.style.display = "block";
            statusEl.textContent = "Done.";
        } catch (error) {
            qrImageEl.style.display = "none";
            statusEl.textContent = error.message;
        } finally {
            generateBtn.disabled = false;
        }
    }

    generateBtn.addEventListener("click", generateQr);
    urlEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter") generateQr();
    });

    async function loadStarCount() {
        try {
            const response = await fetch("https://api.github.com/repos/Rachitneema03/QR-Generator", {
                headers: { "Accept": "application/vnd.github+json" }
            });

            if (!response.ok) {
                return;
            }

            const data = await response.json();
            const count = Number.isFinite(data.stargazers_count) ? data.stargazers_count : null;
            if (count !== null) {
                starLabelEl.textContent = `Star (${count})`;
            }
        } catch (error) {
            // Keep default label if GitHub API is unavailable.
        }
    }

    loadStarCount();
</script>
</html>
